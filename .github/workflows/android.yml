name: Build ConvR APK
on: 
  push:
    branches: [ main, master ] # Запускать при пуше в основную ветку
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev libltdl-dev \
            openjdk-17-jdk-headless autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libsqlite3-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 virtualenv

      - name: Build with Buildozer
        run: buildozer android debug
        env:
          # Авто-подтверждение лицензий Android SDK
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # Кэширование для ускорения последующих сборок
          BUILDOZER_ALLOW_ORG_NAME_START: "1"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConvR-Release-APK
          path: bin/*.apk
